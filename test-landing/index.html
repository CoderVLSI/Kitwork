<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cool App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
        }
        h1 span { color: #f97316; }
        p { color: #7878a0; font-size: 1.1rem; max-width: 500px; margin: 0 auto 2rem; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #f97316, #ffab40);
            color: white;
            font-weight: 700;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Welcome to <span>CoolApp</span></h1>
        <p>A test project pushed via Kitwork CLI with full authentication.</p>
        <a href="#" class="btn">Get Started</a>
    </div>
</body>
</html>
